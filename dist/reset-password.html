<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MainframeStudyHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #f8f9fc; overflow: hidden;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 12s ease-in-out infinite; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, #7c3aed, transparent); top: -10%; left: -5%; }
    .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, #0071e3, transparent); bottom: -10%; right: -5%; animation-delay: 4s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .card {
      position: relative; z-index: 1; background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.7);
      border-radius: 28px; padding: 48px 40px; max-width: 420px; width: 90%;
      text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.08); animation: scaleIn 0.6s ease both;
    }
    h1 { font-size: 24px; font-weight: 800; color: #1d1d1f; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #86868b; margin-bottom: 24px; }
    input {
      width: 100%; padding: 14px 16px; font-size: 15px; border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 12px; outline: none; background: rgba(245,245,247,0.8); margin-bottom: 14px;
      font-family: inherit; color: #1d1d1f; transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #0071e3, #7c3aed);
      color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { background: #a0a0a5; cursor: wait; }
    .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .msg-err { background: #fee2e2; color: #991b1b; }
    .msg-ok { background: #f0fdf4; color: #166534; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Reset Form -->
  <div class="card" id="resetCard">
    <div style="font-size:48px;margin-bottom:12px">🔒</div>
    <h1>Set New Password</h1>
    <p class="sub">Enter your new password below</p>
    <div id="msg" class="msg hidden"></div>
    <input type="password" id="pass1" placeholder="New password (min 6 chars)" />
    <input type="password" id="pass2" placeholder="Confirm new password" />
    <button class="btn" id="submitBtn" onclick="resetPassword()">Update Password</button>
  </div>

  <!-- Success -->
  <div class="card hidden" id="successCard">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <h1>Password Updated!</h1>
    <p class="sub">Your password has been changed successfully. You can now sign in with your new password.</p>
    <a href="/" class="btn" style="display:block;text-decoration:none;text-align:center">Go to MainframeStudyHub →</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Read keys from the main app's supabaseClient (or hardcode here)
    // These will be replaced at build time or you set them here
    const SUPABASE_URL = localStorage.getItem('sb-url') || 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_KEY = localStorage.getItem('sb-key') || 'YOUR_ANON_KEY_HERE';

    // Try to detect from the page's origin
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function resetPassword() {
      const pass1 = document.getElementById('pass1').value;
      const pass2 = document.getElementById('pass2').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');

      msg.className = 'msg hidden';

      if (pass1.length < 6) {
        msg.textContent = 'Password must be at least 6 characters.';
        msg.className = 'msg msg-err';
        return;
      }
      if (pass1 !== pass2) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'msg msg-err';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const { error } = await supabase.auth.updateUser({ password: pass1 });
        if (error) {
          msg.textContent = error.message;
          msg.className = 'msg msg-err';
          btn.disabled = false;
          btn.textContent = 'Update Password';
        } else {
          document.getElementById('resetCard').classList.add('hidden');
          document.getElementById('successCard').classList.remove('hidden');
        }
      } catch (e) {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.className = 'msg msg-err';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  </script>
</body>
</html>
