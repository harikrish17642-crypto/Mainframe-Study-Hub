<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MainframeStudyHub</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080b16;overflow:hidden;color:#e2e8f0}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;animation:float 12s ease-in-out infinite}
    .orb-1{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,transparent);top:-10%;left:-5%}
    .orb-2{width:350px;height:350px;background:radial-gradient(circle,#0071e3,transparent);bottom:-10%;right:-5%;animation-delay:4s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .card{position:relative;z-index:1;background:rgba(17,24,39,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.3);animation:scaleIn .6s ease both}
    h1{font-size:24px;font-weight:800;color:#f1f5f9;margin-bottom:8px}
    .sub{font-size:14px;color:#94a3b8;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:15px;border:1.5px solid rgba(255,255,255,.1);border-radius:12px;outline:none;background:rgba(30,41,59,.8);margin-bottom:14px;font-family:inherit;color:#f1f5f9;transition:border-color .2s}
    input:focus{border-color:#0071e3}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#0071e3,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s}
    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:wait}
    .msg{padding:12px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
    .msg.ok{display:block;background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .msg.err{display:block;background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
    .back{display:inline-block;margin-top:20px;color:#60a5fa;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="card">
    <h1>🔒 Reset Your Password</h1>
    <p class="sub">Enter your new password below</p>
    <div class="msg" id="msg"></div>
    <input type="password" id="pw1" placeholder="New password (min 6 chars)" />
    <input type="password" id="pw2" placeholder="Confirm new password" />
    <button class="btn" id="btn" onclick="resetPw()">Reset Password</button>
    <a href="/" class="back">← Back to MainframeStudyHub</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var sb=supabase.createClient('https://xnvxdnltimsmlelpyxeq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhudnhkbmx0aW1zbWxlbHB5eGVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzcyMjAsImV4cCI6MjA4NzkxMzIyMH0.PFEldS3f6MgegbF5FfnujP5I59kAnFnvXvGzr-vgh9o');
    function showMsg(t,ok){var m=document.getElementById('msg');m.textContent=t;m.className='msg '+(ok?'ok':'err')}
    async function resetPw(){
      var pw1=document.getElementById('pw1').value,pw2=document.getElementById('pw2').value;
      if(!pw1||pw1.length<6){showMsg('Password must be at least 6 characters.',false);return}
      if(pw1!==pw2){showMsg('Passwords do not match.',false);return}
      document.getElementById('btn').disabled=true;
      try{
        var r=await sb.auth.updateUser({password:pw1});
        if(r.error){showMsg(r.error.message,false);document.getElementById('btn').disabled=false}
        else{showMsg('Password reset successfully! Redirecting...',true);setTimeout(function(){window.location.href='/'},2000)}
      }catch(e){showMsg(e.message||'Something went wrong.',false);document.getElementById('btn').disabled=false}
    }
  </script>
</body>
</html>
