<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#0f1642"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0071e3"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow1" cx="25%" cy="30%" r="50%" fx="25%" fy="30%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0071e3;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="75%" cy="70%" r="50%" fx="75%" fy="70%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow orbs -->
  <ellipse cx="300" cy="200" rx="300" ry="250" fill="url(#glow1)"/>
  <ellipse cx="900" cy="450" rx="350" ry="280" fill="url(#glow2)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>
  
  <!-- Chip icon -->
  <g transform="translate(540, 120)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#accent)" opacity="0.9"/>
    <!-- Z letter -->
    <text x="60" y="82" font-family="Arial,sans-serif" font-size="68" font-weight="800" fill="white" text-anchor="middle">Z</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="310" font-family="Arial,Helvetica,sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    MainframeStudyHub
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="365" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="#a0a8c8" text-anchor="middle">
    The Complete IBM Z Mainframe Learning Platform
  </text>
  
  <!-- Accent line -->
  <rect x="450" y="395" width="300" height="3" rx="2" fill="url(#accent)"/>
  
  <!-- Feature pills -->
  <g transform="translate(600, 440)" font-family="Arial,sans-serif" font-size="16" font-weight="600">
    <!-- Pill 1 -->
    <rect x="-290" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="-230" y="24" fill="#d0d4e8" text-anchor="middle">📚 15 Topics</text>
    <!-- Pill 2 -->
    <rect x="-150" y="0" width="140" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="-80" y="24" fill="#d0d4e8" text-anchor="middle">🧠 200 Quizzes</text>
    <!-- Pill 3 -->
    <rect x="10" y="0" width="140" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="80" y="24" fill="#d0d4e8" text-anchor="middle">💬 Community</text>
    <!-- Pill 4 -->
    <rect x="170" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="230" y="24" fill="#d0d4e8" text-anchor="middle">🤖 AI Chat</text>
  </g>
  
  <!-- Bottom tech tags -->
  <text x="600" y="540" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#6b7199" text-anchor="middle" letter-spacing="3">
    JCL · COBOL · REXX · DB2 · CICS · IMS · VSAM · RACF · z/OS · TSO/ISPF
  </text>
  
  <!-- Bottom gradient border -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
